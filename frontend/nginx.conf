# ── Rate Limiting Zones ─────────────────────────────────────────────────────
# General API: 20 req/s per IP burst=40 to handle normal usage
limit_req_zone  $binary_remote_addr zone=api:10m    rate=20r/s;
# Auth endpoints: strict 5 req/min per IP to prevent brute-force
limit_req_zone  $binary_remote_addr zone=auth:10m   rate=5r/m;

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ────────────────────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header X-XSS-Protection           "1; mode=block"                       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; worker-src 'self' blob:;" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 🔥 IMPORTANT: Proxy API to backend container
    location /api/ {
        limit_req zone=api burst=40 nodelay;

        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;

        # Timeouts: 60s for normal requests, kept higher only for bulk imports
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        send_timeout          60s;

        # Upload limit aligned with Spring multipart config (60MB)
        client_max_body_size 60M;
    }

    # Auth endpoints: strict rate limiting against brute-force
    location /api/v1/auth/ {
        limit_req zone=auth burst=3 nodelay;

        proxy_pass http://backend:8080/api/v1/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
    }
}